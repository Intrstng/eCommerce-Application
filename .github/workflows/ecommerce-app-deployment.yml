name: eCommerce app deployment
on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [ 20.x ]
    steps:
      - uses: actions/checkout@v3
      - name: Starting Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v3
        with:
          node-version: ${{ matrix.node-version }}
      - name: Cache dependencies
        uses: actions/cache@v3
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ matrix.node-version }}-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-${{ matrix.node-version }}-
      - name: install modules
        run: npm install
      - name: unit test
        run: npm run coverage
        continue-on-error: false

      - name: Upload coverage reports to artifact storage
        uses: echapmanFromBunnings/upload-artifact@3.0
        with:
          name: vitest-coverage
          path: coverage
          if-no-files-found: warn

  lint-format:
    runs-on: ubuntu-latest
    needs: test
    strategy:
      matrix:
        node-version: [ 20.x ]
    steps:
      - uses: actions/checkout@v3
      - name: Starting Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v3
        with:
          node-version: ${{ matrix.node-version }}
      - name: Cache dependencies
        uses: actions/cache@v3
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ matrix.node-version }}-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-${{ matrix.node-version }}-
      - name: install modules
        run: npm install
      - name: lint code
        run: npm run lint:fix
      - name: format code
        run: npm run format:fix
      - name: format stylelint code
        run: npm run stylelint:fix
  deploy:
    runs-on: ubuntu-latest
    needs: [ test, lint-format ]
    steps:
      - name: Get code
        uses: actions/checkout@v3

      - name: Install Netlify CLI
        run: npm install -g netlify-cli

      - name: deploy to netlify
        id: deploy
        uses: nahianku1/netlify-deploy@v1
        with:
          auth_token: ${{ secrets.NETLIFY_TEAM_API_KEY }}
          site_name: ecommerce-lean-code
          build_directory: dist

      - name: Output URL
        run: echo "${{ steps.deploy.outputs.live-url }}"